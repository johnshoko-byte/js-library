<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="titleText">
                <h1>Library</h1>
                <p>Track your reading</p>
            </div>

            <button type="button" class="addBtn">+ Add Book</button>
        </div>
        <div class="metrics">
            <div class="metric total">
                <p class="metricTitle">Total</p>
                <p id="readMetricValue" class="metricValue">0</p>
            </div>
            <div class=" metric read">
                <p class="metricTitle">Read</p>
                <p id="readMetricValue" class="metricValue">0</p>
            </div>
            <div class=" metric pending">
                <p class="metricTitle">Pending</p>
                <p id="readMetricValue" class="metricValue">0</p>
            </div>
        </div>
        <div class="booksList"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
