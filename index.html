<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="titleText">
                <h1>Library</h1>
                <p>Track your reading</p>
            </div>

            <button command="show-modal" commandfor="book-form" class="addBtn">+ Add Book</button>

            <dialog id="book-form">
                <form id="add-book-form">
                    <button type="button" id="close-dialog-button">
                        Close
                    </button>

                    <fieldset>
                        <legend>Add a book</legend>

                        <p>
                            <label for="bookTitle">Title:</label>
                            <input id="bookTitle" name="title" type="text" required>
                        </p>

                        <p>
                            <label for="bookAuthor">Author:</label>
                            <input id="bookAuthor" name="author" type="text" required>
                        </p>

                        <p>
                            <label for="bookPages">Pages:</label>
                            <input id="bookPages" name="pages" type="number" min="1" required>
                        </p>

                        <p>
                            <label for="readStatus">Have you read it?</label>

                            <select id="readStatus" name="readStatus">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </p>
                    </fieldset>

                    <div>
                        <button type="submit" id="confirmBtn">
                            Add Book
                        </button>
                    </div>
                </form>
            </dialog>
        </div>
        <div class="metrics">
            <div class="metric total">
                <p class="metricTitle">Total</p>
                <p id="totalMetricValue" class="metricValue">0</p>
            </div>
            <div class=" metric read">
                <p class="metricTitle">Read</p>
                <p id="readMetricValue" class="metricValue">0</p>
            </div>
            <div class=" metric pending">
                <p class="metricTitle">Pending</p>
                <p id="pendingMetricValue" class="metricValue">0</p>
            </div>
        </div>
        <div class="bookShelf"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
